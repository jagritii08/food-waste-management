
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FoodBridge — Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1b5e20, #43a047);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            width: 520px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1b5e20;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-option:hover { border-color: #2e7d32; background: #f1f8e9; }
        .role-option .icon { font-size: 28px; margin-bottom: 6px; }
        .role-option .name { font-size: 13px; font-weight: 600; color: #333; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 7px;
        }
        input, select {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.3s;
            background: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2e7d32;
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1b5e20, #43a047);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }
        .btn:hover { opacity: 0.9; }
        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }
        .login-link a { color: #2e7d32; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🌿 FoodBridge</div>
    <div class="subtitle">Create your account to get started</div>

    <form action="/register" method="post" th:object="${user}">
        <div class="form-group">
            <label>I am registering as *</label>
            <select th:field="*{role}" required>
                <option value="">-- Select Role --</option>
                <option value="RESTAURANT">🍽️ Restaurant</option>
                <option value="NGO">🤝 NGO / Charity</option>
            </select>
        </div>

        <div class="form-group">
            <label>Organization Name *</label>
            <input type="text" th:field="*{organizationName}"
                   placeholder="Your restaurant or NGO name" required/>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" th:field="*{username}"
                       placeholder="Choose username" required/>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" th:field="*{password}"
                       placeholder="Create password" required/>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" th:field="*{email}"
                   placeholder="your@email.com" required/>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phone}"
                       placeholder="Phone number"/>
            </div>
            <div class="form-group">
                <label>City / Address</label>
                <input type="text" th:field="*{address}"
                       placeholder="Your city"/>
            </div>
        </div>

        <button type="submit" class="btn">Create Account →</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Sign in here</a>
    </div>
</div>
</body>
</html>
